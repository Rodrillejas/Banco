<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - BancoUM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="css/logoBanco.png" type="image/png">
</head>
<body>
    <div class="auth-page">
        <div class="auth-left">
            <img src="css/logoBanco.png" alt="BancoUM">
            <h2>Bienvenido de vuelta</h2>
            <p>Accede a tu cuenta y gestiona tus productos financieros de forma segura.</p>
        </div>
        <div class="auth-right">
            <div class="auth-box">
                <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;color:var(--gray-500);font-size:0.9rem;margin-bottom:32px;transition:color 0.2s;">
                    <i class="fa-solid fa-arrow-left"></i> Volver al inicio
                </a>
                <h1>Iniciar Sesión</h1>
                <p class="subtitle">Ingresa con tu cédula y contraseña</p>

                <form id="login-form">
                    <div class="form-group">
                        <label for="cedula">Cédula / Usuario</label>
                        <input type="text" id="cedula" class="form-control" placeholder="Tu número de cédula" required>
                    </div>
                    <div class="form-group">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <label for="password" style="margin-bottom:0;">Contraseña</label>
                            <a href="forgot-password.html" class="forgot-pwd-link" style="font-size:0.85rem;color:var(--primary);text-decoration:none;font-weight:600;transition:color 0.2s;">¿Olvidaste tu contraseña?</a>
                        </div>
                        <input type="password" id="password" class="form-control" placeholder="Tu contraseña" style="margin-top:8px;" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn" style="margin-top:8px;">
                        <i class="fa-solid fa-right-to-bracket"></i>
                        Ingresar
                    </button>
                </form>

                <p style="text-align:center;margin-top:24px;color:var(--gray-500);font-size:0.9rem;">
                    ¿No tienes cuenta? <a href="register.html" style="color:var(--primary);font-weight:600;">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const API_URL = '/api';

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconClass = type === 'success' ? 'fa-circle-check' : (type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-info');
            toast.innerHTML = `<i class="fa-solid ${iconClass}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Ingresando...';

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cedula: document.getElementById('cedula').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Error al iniciar sesión');
                }

                localStorage.setItem('bancoum_token', data.token);
                localStorage.setItem('bancoum_user', JSON.stringify(data.user));

                showToast('¡Bienvenido!');
                setTimeout(() => {
                    if (data.user.rol === 'superadmin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 500);
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Ingresar';
            }
        });

        // If already logged in, redirect
        const token = localStorage.getItem('bancoum_token');
        if (token) {
            try {
                const user = JSON.parse(localStorage.getItem('bancoum_user'));
                if (user.rol === 'superadmin') window.location.href = 'admin.html';
                else window.location.href = 'dashboard.html';
            } catch(e) {}
        }
    </script>
</body>
</html>
